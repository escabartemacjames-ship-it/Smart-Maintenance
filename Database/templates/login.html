<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FIXIT Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    font-family: "Segoe UI", sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
        linear-gradient(rgba(9,30,66,.65),rgba(9,30,66,.65)),
        url("https://eu-images.contentstack.com/v3/assets/bltaec35894448c7261/bltc29021942d699938/68de23b7d4203e4345c6ba99/Maintenance.jpeg");

    background-size:cover;
    background-position:center;
}

.login-card{

    width:420px;

    background:rgba(255,255,255,.95);

    backdrop-filter:blur(12px);

    border:none;

    border-radius:20px;

    box-shadow:0 20px 40px rgba(0,0,0,.25);
}

.logo-circle{

    width:90px;
    height:90px;

    margin:auto;

    border-radius:50%;

    background:#0d6efd;

    display:flex;
    align-items:center;
    justify-content:center;

    color:white;

    font-size:40px;

    box-shadow:0 10px 20px rgba(13,110,253,.3);
}

.title{

    font-weight:700;
    color:#1d3557;
}

.subtitle{

    font-size:.95rem;
    color:#6c757d;
}

.form-control{

    border-radius:12px;
    padding:12px;
}

.input-group-text{

    border-radius:12px 0 0 12px;
    background:#f8f9fa;
}

.btn-login{

    border-radius:12px;
    padding:12px;

    font-weight:600;
    transition:.3s;
}

.btn-login:hover{

    transform:translateY(-2px);

    box-shadow:0 10px 20px rgba(13,110,253,.35);
}

.footer{

    color:#888;
    font-size:14px;
}

</style>

</head>

<body>

<div class="card login-card">

<div class="card-body p-5">

<div class="text-center mb-4">

<div class="logo-circle">

<i class="fa-solid fa-screwdriver-wrench"></i>

</div>

<h3 class="title mt-3">

FIXIT

</h3>

<p class="subtitle">

Facility Issue Exchange and Inspection Tracker

</p>

</div>

<form action="/login" method="POST">

<div class="mb-3">

<label class="form-label">Email</label>

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-envelope"></i>

</span>

<input
type="email"
class="form-control"
name="email"
placeholder="Enter your email"
required>

</div>

</div>

<div class="mb-3">

<label class="form-label">Password</label>

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-lock"></i>

</span>

<input
type="password"
class="form-control"
name="password"
placeholder="Enter your password"
required>

</div>

</div>

<div class="d-flex justify-content-between mb-4">

<div class="form-check">

<input class="form-check-input" type="checkbox">

<label class="form-check-label">

Remember Me

</label>

</div>

<a href="/forgot_password" class="text-decoration-none">
    Forgot Password?
</a>

</div>

<button class="btn btn-primary btn-login w-100">

<i class="fa-solid fa-right-to-bracket me-2"></i>

Login

</button>

</form>

<hr>

<div class="text-center mb-3">
    <p class="mb-2">Don't have an account?</p>

    <a href="/register"
       class="btn btn-outline-primary w-100">
        <i class="fa-solid fa-user-plus me-2"></i>
        Create Account
    </a>
</div>

<p class="text-center footer mb-0">
FIXIT Smart Maintenance Management System
</p>

</div>

</div>

</body>
</html>
