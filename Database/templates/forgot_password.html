<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FIXIT | Forgot Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    font-family:"Segoe UI",sans-serif;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:
        linear-gradient(rgba(9,30,66,.70),rgba(9,30,66,.70)),
        url("https://eu-images.contentstack.com/v3/assets/bltaec35894448c7261/bltc29021942d699938/68de23b7d4203e4345c6ba99/Maintenance.jpeg");

    background-size:cover;
    background-position:center;

}

.reset-card{

    width:480px;

    background:rgba(255,255,255,.95);

    backdrop-filter:blur(12px);

    border:none;

    border-radius:22px;

    overflow:hidden;

    box-shadow:0 20px 45px rgba(0,0,0,.30);

}

.logo{

    width:90px;
    height:90px;

    border-radius:50%;

    background:#0d6efd;

    display:flex;

    justify-content:center;

    align-items:center;

    margin:auto;

    color:white;

    font-size:40px;

    box-shadow:0 10px 20px rgba(13,110,253,.35);

}

.title{

    font-weight:700;

    color:#1d3557;

}

.subtitle{

    color:#6c757d;

    font-size:.95rem;

}

.form-control{

    border-radius:12px;

    padding:12px;

}

.input-group-text{

    background:#f8f9fa;

    border-radius:12px 0 0 12px;

}

.btn-reset{

    border-radius:12px;

    padding:12px;

    font-weight:600;

    transition:.3s;

}

.btn-reset:hover{

    transform:translateY(-2px);

    box-shadow:0 10px 20px rgba(13,110,253,.35);

}

.btn-back{

    border-radius:12px;

}

.footer{

    font-size:14px;

    color:#888;

}

</style>

</head>

<body>

<div class="card reset-card">

<div class="card-body p-5">

<div class="text-center mb-4">

<div class="logo">

<i class="fa-solid fa-key"></i>

</div>

<h2 class="title mt-3">

Reset Password

</h2>

<p class="subtitle">

Enter your email and create a new password.

</p>

</div>

<form action="/reset_password" method="POST">

<div class="mb-3">

<label class="form-label">

Email Address

</label>

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-envelope"></i>

</span>

<input
type="email"
name="email"
class="form-control"
placeholder="Enter your registered email"
required>

</div>

</div>

<div class="mb-3">

<label class="form-label">

New Password

</label>

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-lock"></i>

</span>

<input
type="password"
name="password"
id="password"
class="form-control"
placeholder="Create a new password"
required>

</div>

</div>

<div class="mb-4">

<label class="form-label">

Confirm Password

</label>

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-lock"></i>

</span>

<input
type="password"
name="confirm_password"
id="confirm_password"
class="form-control"
placeholder="Confirm your password"
required>

</div>

</div>

<div class="d-grid mb-3">

<button
type="submit"
class="btn btn-primary btn-reset">

<i class="fa-solid fa-rotate-right me-2"></i>

Reset Password

</button>

</div>

<div class="d-grid">

<a
href="/"
class="btn btn-outline-secondary btn-back">

<i class="fa-solid fa-arrow-left me-2"></i>

Back to Login

</a>

</div>

</form>

<hr>

<p class="text-center footer mb-0">

FIXIT Smart Maintenance Management System

</p>

</div>

</div>

<script>

document.querySelector("form").addEventListener("submit",function(e){

    const pass=document.getElementById("password").value;

    const confirm=document.getElementById("confirm_password").value;

    if(pass!==confirm){

        alert("Passwords do not match.");

        e.preventDefault();

    }

});

</script>

</body>

</html>
