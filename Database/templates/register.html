<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FIXIT | Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    font-family:"Segoe UI",sans-serif;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:
        linear-gradient(rgba(9,30,66,.70),rgba(9,30,66,.70)),
        url("https://eu-images.contentstack.com/v3/assets/bltaec35894448c7261/bltc29021942d699938/68de23b7d4203e4345c6ba99/Maintenance.jpeg");

    background-size:cover;
    background-position:center;
}

.register-card{

    width:520px;

    background:rgba(255,255,255,.95);

    backdrop-filter:blur(12px);

    border:none;

    border-radius:22px;

    overflow:hidden;

    box-shadow:0 20px 45px rgba(0,0,0,.30);

}

.logo{

    width:90px;
    height:90px;

    border-radius:50%;

    background:#0d6efd;

    color:white;

    display:flex;

    align-items:center;

    justify-content:center;

    margin:auto;

    font-size:38px;

    box-shadow:0 10px 20px rgba(13,110,253,.35);

}

.title{

    color:#1d3557;

    font-weight:700;
}

.subtitle{

    color:#6c757d;

    font-size:.95rem;
}

.form-control{

    border-radius:12px;

    padding:12px;
}

.form-select{

    border-radius:12px;
}

.input-group-text{

    background:#f8f9fa;

    border-radius:12px 0 0 12px;
}

.btn-register{

    border-radius:12px;

    padding:12px;

    font-weight:600;

    transition:.3s;
}

.btn-register:hover{

    transform:translateY(-2px);

    box-shadow:0 12px 25px rgba(25,135,84,.35);
}

.login-link{

    text-decoration:none;

    font-weight:600;
}

.login-link:hover{

    text-decoration:underline;
}

</style>

</head>

<body>

<div class="card register-card">

<div class="card-body p-5">

<div class="text-center mb-4">

<div class="logo">

<i class="fa-solid fa-user-plus"></i>

</div>

<h2 class="title mt-3">

Create Account

</h2>

<p class="subtitle">

Join the FIXIT Smart Maintenance Management System

</p>

</div>

<form action="/register_user" method="POST">

<div class="mb-3">

<label class="form-label">

Full Name

</label>

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-user"></i>

</span>

<input
type="text"
name="fullname"
class="form-control"
placeholder="Enter your full name"
required>

</div>

</div>

<div class="mb-3">

<label class="form-label">

Email Address

</label>

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-envelope"></i>

</span>

<input
type="email"
name="email"
class="form-control"
placeholder="Enter your email"
required>

</div>

</div>

<div class="mb-3">

<label class="form-label">

Password

</label>

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-lock"></i>

</span>

<input
type="password"
name="password"
id="password"
class="form-control"
placeholder="Create a password"
required>

<button
class="btn btn-outline-secondary"
type="button"
onclick="togglePassword()">

<i class="fa-solid fa-eye" id="eye"></i>

</button>

</div>

</div>

<div class="mb-4">

<label class="form-label">

Confirm Password

</label>

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-lock"></i>

</span>

<input
type="password"
id="confirmPassword"
class="form-control"
placeholder="Confirm your password"
required>

</div>

</div>

<div class="mb-4">

    <label class="form-label">
        Register As
    </label>

    <div class="input-group">

        <span class="input-group-text">
            <i class="fa-solid fa-user-tag"></i>
        </span>

        <select
            name="role"
            class="form-select"
            required>

            <option value="" selected disabled>Select Role</option>

            <option value="student">
                Student
            </option>

            <option value="maintenance">
                Maintenance
            </option>

            <option value="Teacher">
                Teacher
            </option>

        </select>

    </div>

</div>

<button
class="btn btn-success btn-register w-100">

<i class="fa-solid fa-user-check me-2"></i>

Create Account

</button>

</form>

<hr>

<div class="text-center">

Already have an account?

<a href="/" class="login-link">

Login Here

</a>

</div>

</div>

</div>

<script>

function togglePassword(){

    let password=document.getElementById("password");

    let eye=document.getElementById("eye");

    if(password.type==="password"){

        password.type="text";

        eye.className="fa-solid fa-eye-slash";

    }else{

        password.type="password";

        eye.className="fa-solid fa-eye";

    }

}

document.querySelector("form").addEventListener("submit",function(e){

    let pass=document.getElementById("password").value;

    let confirm=document.getElementById("confirmPassword").value;

    if(pass!==confirm){

        alert("Passwords do not match.");

        e.preventDefault();

    }

});

</script>

</body>

</html>
