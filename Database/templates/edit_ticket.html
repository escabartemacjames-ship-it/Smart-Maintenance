<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Maintenance Ticket</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
    background:#eef2f7;
    font-family:'Segoe UI',sans-serif;
}

.navbar{
    background:linear-gradient(90deg,#0d6efd,#2563eb);
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.ticket-card{

    border:none;

    border-radius:20px;

    overflow:hidden;

    box-shadow:0 12px 30px rgba(0,0,0,.08);
}

.card-header{

    background:linear-gradient(90deg,#ffc107,#ff9800);

    color:#fff;

    padding:20px;
}

.form-label{

    font-weight:600;
}

.input-group-text{

    width:45px;

    justify-content:center;

    background:#f8f9fa;
}

.form-control,
.form-select{

    border-radius:10px;

    padding:10px;
}

.form-control:focus,
.form-select:focus{

    box-shadow:0 0 0 .2rem rgba(13,110,253,.15);

    border-color:#0d6efd;
}

.ticket-number{

    background:#f8f9fa;

    font-weight:bold;
}

.btn-save{

    padding:12px 24px;

    border-radius:12px;

    font-weight:600;

    transition:.3s;
}

.btn-save:hover{

    transform:translateY(-2px);

    box-shadow:0 10px 20px rgba(25,135,84,.25);
}

.btn-cancel{

    padding:12px 24px;

    border-radius:12px;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark">

<div class="container-fluid">

<span class="navbar-brand">

<i class="fa-solid fa-screwdriver-wrench me-2"></i>

Facility Issue Exchange and Inspection Tracker

</span>

<a href="/admin/dashboard" class="btn btn-light rounded-pill">

<i class="fa-solid fa-arrow-left me-2"></i>

Back to Dashboard

</a>

</div>

</nav>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card ticket-card">

<div class="card-header">

<h3 class="mb-0">

<i class="fa-solid fa-pen-to-square me-2"></i>

Edit Maintenance Ticket

</h3>

</div>

<div class="card-body p-4">

<form action="/update_ticket/{{ ticket[0] }}" method="POST">

<div class="row">

<div class="col-md-6 mb-4">

<label class="form-label">

Ticket Number

</label>

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-hashtag"></i>

</span>

<input
type="text"
class="form-control ticket-number"
value="{{ ticket[1] }}"
readonly>

</div>

</div>

<div class="col-md-6 mb-4">

<label class="form-label">

Category

</label>

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-list"></i>

</span>

<input
type="text"
class="form-control"
name="category"
value="{{ ticket[3] }}"
required>

</div>

</div>

</div>

<div class="mb-4">

<label class="form-label">

Location

</label>

<div class="input-group">

<span class="input-group-text">

<i class="fa-solid fa-location-dot"></i>

</span>

<input
type="text"
class="form-control"
name="location"
value="{{ ticket[4] }}"
required>

</div>

</div>

<div class="mb-4">

<label class="form-label">

Description

</label>

<textarea
class="form-control"
name="description"
rows="5"
required>{{ ticket[5] }}</textarea>

</div>

<div class="row">

<div class="col-md-6 mb-4">

<label class="form-label">

Priority

</label>

<select
class="form-select"
name="priority">

<option value="Low" {% if ticket[6]=='Low' %}selected{% endif %}>Low</option>

<option value="Medium" {% if ticket[6]=='Medium' %}selected{% endif %}>Medium</option>

<option value="High" {% if ticket[6]=='High' %}selected{% endif %}>High</option>

<option value="Critical" {% if ticket[6]=='Critical' %}selected{% endif %}>Critical</option>

</select>

</div>

<div class="col-md-6 mb-4">

<label class="form-label">

Status

</label>

<select
class="form-select"
name="status">

<option value="Pending" {% if ticket[7]=='Pending' %}selected{% endif %}>Pending</option>

<option value="In Progress" {% if ticket[7]=='In Progress' %}selected{% endif %}>In Progress</option>

<option value="Completed" {% if ticket[7]=='Completed' %}selected{% endif %}>Completed</option>

</select>

</div>

</div>

<div class="d-flex gap-3">

<button
type="submit"
class="btn btn-success btn-save">

<i class="fa-solid fa-floppy-disk me-2"></i>

Save Changes

</button>

<a
href="/admin/dashboard"
class="btn btn-secondary btn-cancel">

<i class="fa-solid fa-arrow-left me-2"></i>

Cancel

</a>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
```
